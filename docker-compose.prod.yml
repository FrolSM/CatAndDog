version: "3.9"

services:

  web:
    image: catanddog_app
    command: gunicorn CatAndDog.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    restart: unless-stopped

  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  celery_worker:
    image: catanddog_app
    command: celery -A CatAndDog worker -l info
    env_file:
      - .env
    restart: unless-stopped

  celery_beat:
    image: catanddog_app
    command: celery -A CatAndDog beat -l info
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/app/static
      - media_volume:/app/media
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:


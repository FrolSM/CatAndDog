version: "3.9"

services:

  web:
    image: catanddog_app
    restart: unless-stopped
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media

  celery_worker:
    image: catanddog_app
    restart: unless-stopped

  celery_beat:
    image: catanddog_app
    restart: unless-stopped

  flower:
    image: catanddog_app
    restart: unless-stopped

  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  nginx:
    ports:
      - "80:80"
    restart: unless-stopped

